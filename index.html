<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Expression Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏰ Cron Expression Builder</h1>
        <p class="subtitle">Build cron schedules visually — no syntax memorisation needed</p>

        <div class="presets">
            <h3>Quick Presets</h3>
            <div class="preset-buttons">
                <button onclick="applyPreset('* * * * *')">Every Minute</button>
                <button onclick="applyPreset('0 * * * *')">Every Hour</button>
                <button onclick="applyPreset('0 0 * * *')">Daily (Midnight)</button>
                <button onclick="applyPreset('0 9 * * 1')">Monday 9am</button>
                <button onclick="applyPreset('0 9 * * 1-5')">Weekdays 9am</button>
                <button onclick="applyPreset('0 0 1 * *')">First of Month</button>
            </div>
        </div>

        <div class="builder">
            <div class="field">
                <label>Minute</label>
                <select id="minute">
                    <option value="*">Every minute (*)</option>
                    <option value="0">0</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                    <option value="30">30</option>
                    <option value="35">35</option>
                    <option value="40">40</option>
                    <option value="45">45</option>
                    <option value="50">50</option>
                    <option value="55">55</option>
                </select>
                <input type="text" id="minute-custom" placeholder="or type: */5, 0,30" class="custom-input">
            </div>

            <div class="field">
                <label>Hour</label>
                <select id="hour">
                    <option value="*">Every hour (*)</option>
                </select>
                <input type="text" id="hour-custom" placeholder="or type: */2, 9-17" class="custom-input">
            </div>

            <div class="field">
                <label>Day of Month</label>
                <select id="dom">
                    <option value="*">Every day (*)</option>
                </select>
                <input type="text" id="dom-custom" placeholder="or type: 1,15" class="custom-input">
            </div>

            <div class="field">
                <label>Month</label>
                <select id="month">
                    <option value="*">Every month (*)</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>

            <div class="field">
                <label>Day of Week</label>
                <select id="dow">
                    <option value="*">Every day (*)</option>
                    <option value="0">Sunday</option>
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                    <option value="1-5">Weekdays (Mon-Fri)</option>
                    <option value="0,6">Weekends (Sat-Sun)</option>
                </select>
            </div>
        </div>

        <div class="output">
            <div class="expression-box">
                <label>Cron Expression</label>
                <div class="expression" id="expression">* * * * *</div>
                <button onclick="copyExpression()" id="copy-btn">📋 Copy</button>
            </div>

            <div class="description-box">
                <label>What this means</label>
                <div id="description" class="description">Every minute</div>
            </div>

            <div class="next-runs-box">
                <label>Next 5 run times</label>
                <ul id="next-runs"></ul>
            </div>
        </div>
    </div>

    <footer>
        Built by <a href="https://www.handonweb.com">Hand On Web</a> · Chester, UK
    </footer>

    <script src="app.js"></script>
</body>
</html>
